name: Compilar APK Android (FinaPro)

on:
push:
branches:
- main
pull_request:
branches:
- main

STREAMING_CHUNK: Configurando el job de compilación...

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Descargar repositorio
    uses: actions/checkout@v4

  - name: Configurar Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 20

  - name: Instalar dependencias
    run: npm install

  - name: Validar carpeta web (www)
    run: |
      if [ ! -d "www" ]; then
        mkdir www
        echo "<h1>FinaPro</h1>" > www/index.html
      fi

  # STREAMING_CHUNK: Configurando compilación de Android nativo...
  - name: Configurar JDK 17
    uses: actions/setup-java@v4
    with:
      distribution: 'zulu'
      java-version: '17'

  - name: Configurar Android SDK
    uses: android-actions/setup-android@v3

  # STREAMING_CHUNK: Ejecutando sincronización nativa de Capacitor...
  - name: Sincronizar plataformas de Capacitor
    run: |
      node node_modules/@capacitor/cli/bin/capacitor sync
      if [ ! -d "android" ]; then
        node node_modules/@capacitor/cli/bin/capacitor add android
      fi
      node node_modules/@capacitor/cli/bin/capacitor sync android

  # STREAMING_CHUNK: Compilando binarios con Gradle...
  - name: Permisos para Gradle
    run: chmod +x android/gradlew

  - name: Compilar APK de Android
    run: |
      cd android
      ./gradlew assembleDebug

  # STREAMING_CHUNK: Subiendo artefacto final compilado...
  - name: Subir APK Compilado
    uses: actions/upload-artifact@v4
    with:
      name: FinaPro-ModaEvelyn-Debug-APK
      path: android/app/build/outputs/apk/debug/app-debug.apk
      retention-days: 7