name: Compilar APK Android - FinaPro

on:
push:
branches:
- main

env:
CAPACITOR_TELEMETRY_DISABLED: 1

jobs:
build:
name: Build APK de Producción
runs-on: ubuntu-latest

steps:
  # 1. Clonar el repositorio limpio de GitHub
  - name: Clonar Repositorio
    uses: actions/checkout@v4

  # 2. Configurar JDK 17 para Android Gradle
  - name: Configurar Java JDK 17
    uses: actions/setup-java@v4
    with:
      distribution: 'zulu'
      java-version: '17'

  # 3. Configurar Node de manera limpia
  - name: Configurar Entorno Node.js
    uses: actions/setup-node@v4
    with:
      node-version: '20'

  # 4. Forzar instalación fresca y limpia de dependencias (npm ci o install fresco)
  - name: Instalar Dependencias Frescas
    run: |
      npm install --legacy-peer-deps

  # 5. Asegurar que la carpeta de destino web exista
  - name: Validar carpeta web (www)
    run: |
      if [ ! -d "www" ]; then
        mkdir www
        echo "<h1>FinaPro</h1>" > www/index.html
      fi

  # 6. Auto-aceptar Licencias de Android SDK
  - name: Auto-aceptar Licencias de Android SDK
    run: |
      yes | sdkmanager --licenses || true

  # 7. Sincronizar plataformas de Capacitor directamente con Node (Evita restricciones de shell)
  - name: Sincronizar plataformas de Capacitor
    run: |
      node node_modules/@capacitor/cli/bin/capacitor sync
      if [ ! -d "android" ]; then
        node node_modules/@capacitor/cli/bin/capacitor add android
      fi
      node node_modules/@capacitor/cli/bin/capacitor sync android

  # 8. Otorgar permisos de ejecución Gradle
  - name: Otorgar Permisos de Ejecución Gradle
    run: chmod +x android/gradlew

  # 9. Compilar archivo APK debuggable nativo
  - name: Compilar archivo APK debuggable
    run: |
      cd android
      ./gradlew assembleDebug

  # 10. Guardar y exponer APK terminado
  - name: Guardar y Exponer APK Terminado
    uses: actions/upload-artifact@v4
    with:
      name: FinaPro-Fashion-Instalador
      path: android/app/build/outputs/apk/debug/app-debug.apk
      retention-days: 7
