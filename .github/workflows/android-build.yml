name: Compilar APK Android (FinaPro)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repositorio
      - name: Descargar repositorio
        uses: actions/checkout@v4

      # 2. Configurar el entorno de Node.js
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Instalar dependencias de Capacitor
      - name: Instalar dependencias
        run: npm install

      # 4. Asegurar que la carpeta web de origen existe
      - name: Validar carpeta web (www)
        run: |
          if [ ! -d "www" ]; then
            mkdir www
            echo "<h1>FinaPro</h1>" > www/index.html
          fi

      # 5. Configurar Java (Requerido para compilar Android Gradle)
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 6. Configurar herramientas de compilación de Android
      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      # 7. Sincronizar plataformas ejecutando la CLI directamente con Node (Evita el Permission Denied)
      - name: Sincronizar plataformas de Capacitor
        run: |
          node node_modules/@capacitor/cli/bin/capacitor sync
          if [ ! -d "android" ]; then
            node node_modules/@capacitor/cli/bin/capacitor add android
          fi
          node node_modules/@capacitor/cli/bin/capacitor sync android

      # 8. Otorgar permisos de ejecución al script Gradle wrapper de Android
      - name: Permisos para Gradle
        run: chmod +x android/gradlew

      # 9. Compilar el archivo APK en modo Debug
      - name: Compilar APK de Android
        run: |
          cd android
          ./gradlew assembleDebug

      # 10. Subir el APK generado a los artefactos de GitHub para su descarga
      - name: Subir APK Compilado
        uses: actions/upload-artifact@v4
        with:
          name: FinaPro-ModaEvelyn-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
```eof

---

### Pasos para subirlo desde la terminal de VSCode:

Asegúrate de guardar el archivo en VSCode (`Ctrl + S`) y corre estos comandos en orden para certificar que impacten en la nube:

```bash
# 1. Forzar a Git a indexar el archivo del flujo de trabajo
git add .github/workflows/android-build.yml

# 2. Crear el commit de reparación definitiva
git commit -m "fix: bypass de permisos usando ejecucion directa por nodo en capacitor"

# 3. Subir a la rama principal
git push origin main